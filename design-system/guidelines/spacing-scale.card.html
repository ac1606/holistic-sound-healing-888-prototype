<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing Scale" subtitle="4px base scale, --space-1 through --space-9" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-body);font-size:11px;color:var(--text-muted);display:flex;align-items:flex-end;gap:6px;height:150px;padding:16px;background:var(--surface-page);}
.bar{background:var(--brand-gradient-warm);border-radius:4px 4px 0 0;display:flex;align-items:flex-start;justify-content:center;padding-top:4px;}
</style></head>
<body>
<div class="bar" style="width:24px;height:4px;">1</div>
<div class="bar" style="width:24px;height:8px;">2</div>
<div class="bar" style="width:24px;height:12px;">3</div>
<div class="bar" style="width:24px;height:16px;">4</div>
<div class="bar" style="width:24px;height:24px;">5</div>
<div class="bar" style="width:24px;height:32px;">6</div>
<div class="bar" style="width:24px;height:48px;">7</div>
<div class="bar" style="width:24px;height:64px;">8</div>
<div class="bar" style="width:24px;height:96px;">9</div>
</body></html>
