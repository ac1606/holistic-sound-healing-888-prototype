<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;display:flex;gap:14px;align-items:center;height:150px;padding:16px;background:var(--surface-page);font-family:var(--font-body);font-size:12px;color:var(--text-muted);}
.b{width:80px;height:80px;background:var(--surface-card);box-shadow:var(--shadow-card);display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px;}
</style></head>
<body>
<div class="b" style="border-radius:var(--radius-sm);">sm</div>
<div class="b" style="border-radius:var(--radius-md);">md</div>
<div class="b" style="border-radius:var(--radius-lg);">lg</div>
<div class="b" style="border-radius:var(--radius-pill);">pill</div>
</body></html>
