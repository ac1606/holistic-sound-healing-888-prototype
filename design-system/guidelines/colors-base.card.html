<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-body);}

.s{flex:1;display:flex;align-items:flex-end;padding:10px;font-size:12px;font-weight:600;}
</style></head>
<body>
<div class="row">
  <div class="s" style="background:var(--gold);color:#5A3B00;">gold</div>
  <div class="s" style="background:var(--orange);color:#fff;">orange</div>
  <div class="s" style="background:var(--teal);color:#fff;">teal</div>
  <div class="s" style="background:var(--sky-blue);color:#fff;">sky-blue</div>
  <div class="s" style="background:var(--periwinkle);color:#fff;">periwinkle</div>
  <div class="s" style="background:var(--navy);color:#fff;">navy</div>
  <div class="s" style="background:var(--cream);color:#211E2B;">cream</div>
</div>
</body></html>
